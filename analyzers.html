<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyzer Database - Laboratory Knowledge Hub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">🏠 Home</a></li>
            <li><a href="analyzers.html">🔬 Analyzers</a></li>
            <li><a href="knowledge.html">📚 Knowledge Base</a></li>
            <li><a href="projects.html">📋 Projects</a></li>
        </ul>
    </nav>

    <div class="container">
        <header>
            <h1>🔬 Laboratory Analyzer Database</h1>
            <p>Complete specifications, parameters, and troubleshooting guides</p>
        </header>

        <div class="content">
            <h2>Analyzer Directory</h2>
            
            <div class="search-box">
                <input 
                    type="text" 
                    id="search-analyzers" 
                    class="search-input" 
                    placeholder="Search by analyzer name or type..."
                    onkeypress="if(event.key==='Enter') searchAnalyzers(this.value)"
                >
                <button onclick="searchAnalyzers(document.getElementById('search-analyzers').value)">Search</button>
            </div>

            <div id="analyzers-container" class="card-grid"></div>

            <div id="analyzer-detail" class="detail-view"></div>
        </div>

        <footer>
            <p>&copy; 2026 PANTONE Medical Laboratory Knowledge Base.</p>
        </footer>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
